server {
    listen 8080;
    listen [::]:8080;
    server_name _;
    root /var/www/html/public;
    index index.php;

    # Batasan ukuran upload
    client_max_body_size 50M;

    # Logging
    access_log /dev/stdout;
    error_log /dev/stderr;

    # Gzip compression
    gzip on;
    gzip_comp_level 5;
    gzip_min_length 256;
    gzip_proxied any;
    gzip_vary on;
    gzip_types
        application/javascript
        application/json
        application/xml
        text/css
        text/plain
        text/javascript
        image/svg+xml;

    # Serve static files langsung
    location ~* \.(js|css|png|jpg|jpeg|gif|ico|svg|woff|woff2|ttf|eot|br|gz)$ {
        expires 1y;
        access_log off;
        add_header Cache-Control "public, immutable";
        try_files $uri =404;
    }

    # Handle semua request via Laravel router
    location / {
        try_files $uri $uri/ /index.php?$query_string;
    }

    # Pass PHP ke PHP-FPM
    location ~ \.php$ {
        fastcgi_pass 127.0.0.1:9000;
        fastcgi_index index.php;
        fastcgi_param SCRIPT_FILENAME $realpath_root$fastcgi_script_name;
        include fastcgi_params;
        fastcgi_hide_header X-Powered-By;
    }

    # Blokir akses file tersembunyi
    location ~ /\.(?!well-known) {
        deny all;
    }
}
