[www]
user = www-data
group = www-data

listen = 127.0.0.1:9000

pm = dynamic
pm.max_children = 10
pm.start_servers = 2
pm.min_spare_servers = 1
pm.max_spare_servers = 4
pm.max_requests = 500

; Logging
catch_workers_output = yes
decorate_workers_output = no

; Timeout
request_terminate_timeout = 60

; Clear environment
clear_env = no
